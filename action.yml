name: "Sentinel CI"
description: "Sentinel CI — AI-powered PR security and governance (AI Code Guardian engine). Detects vulnerabilities and posts actionable feedback."
author: "abin-g"

branding:
  icon: "shield"
  color: "blue"

inputs:
  github_token:
    description: "GitHub token for posting PR comments"
    required: true
    default: ${{ github.token }}
  scan_path:
    description: "Path to scan (relative to workspace)"
    required: false
    default: "."
  block_on_findings:
    description: "Fail the action if critical security issues are found"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: "🛡️ Step 1: Initialize Analysis"
      shell: bash
      run: |
        docker run --rm \
          -v ${{ github.workspace }}:${{ github.workspace }} \
          -e GITHUB_WORKSPACE=${{ github.workspace }} \
          -e INPUT_SCAN_PATH=${{ inputs.scan_path }} \
          -e INPUT_STEP="context" \
          -e INPUT_STATE_FILE="${{ github.workspace }}/.sentinel_ci_state.json" \
          -e TELEMETRY_KEY=${{ env.TELEMETRY_KEY }} \
          ghcr.io/abin-g/sentinel-ci-core:latest

    - name: "🔍 Step 2: Full-Repo Context Discovery"
      shell: bash
      run: |
        docker run --rm \
          -v ${{ github.workspace }}:${{ github.workspace }} \
          -e GITHUB_WORKSPACE=${{ github.workspace }} \
          -e INPUT_SCAN_PATH=${{ inputs.scan_path }} \
          -e INPUT_STEP="scan" \
          -e INPUT_STATE_FILE="${{ github.workspace }}/.sentinel_ci_state.json" \
          -e TELEMETRY_KEY=${{ env.TELEMETRY_KEY }} \
          ghcr.io/abin-g/sentinel-ci-core:latest

    - name: "🤖 Step 3: AI Practice & Standards Review"
      shell: bash
      run: |
        docker run --rm \
          -v ${{ github.workspace }}:${{ github.workspace }} \
          -e GITHUB_WORKSPACE=${{ github.workspace }} \
          -e INPUT_SCAN_PATH=${{ inputs.scan_path }} \
          -e INPUT_STEP="ai" \
          -e INPUT_STATE_FILE="${{ github.workspace }}/.sentinel_ci_state.json" \
          -e OPENAI_API_KEY=${{ env.OPENAI_API_KEY }} \
          -e ANTHROPIC_API_KEY=${{ env.ANTHROPIC_API_KEY }} \
          -e GEMINI_API_KEY=${{ env.GEMINI_API_KEY }} \
          -e TELEMETRY_KEY=${{ env.TELEMETRY_KEY }} \
          ghcr.io/abin-g/sentinel-ci-core:latest

    - name: "📊 Step 4: PR Feedback & Reporting"
      shell: bash
      run: |
        docker run --rm \
          -v ${{ github.workspace }}:${{ github.workspace }} \
          -e GITHUB_WORKSPACE=${{ github.workspace }} \
          -e GITHUB_REPOSITORY=${{ github.repository }} \
          -e GITHUB_EVENT_PATH=${{ github.event_path }} \
          -e GITHUB_PR_NUMBER=${{ github.event.pull_request.number }} \
          -e GITHUB_TOKEN=${{ inputs.github_token }} \
          -e INPUT_SCAN_PATH=${{ inputs.scan_path }} \
          -e INPUT_BLOCK_ON_FINDINGS=${{ inputs.block_on_findings }} \
          -e INPUT_STEP="report" \
          -e INPUT_STATE_FILE="${{ github.workspace }}/.sentinel_ci_state.json" \
          -e TELEMETRY_KEY=${{ env.TELEMETRY_KEY }} \
          ghcr.io/abin-g/sentinel-ci-core:latest
